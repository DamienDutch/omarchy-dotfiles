exec-once = sunsetr

# Trackpad gestures (Hyprland 0.53.x)
# Syntax + actions: gesture = fingers, direction, action, options
# Directions/actions: https://wiki.hypr.land/Configuring/Gestures/ :contentReference[oaicite:0]{index=0}

gestures {
  # 4-finger left/right: workspace switch
  gesture = 4, horizontal, workspace

  # 4-finger down: fullscreen toggle
  gesture = 4, down, fullscreen

  # ---- Swipe moet al bij ~20% "committen" ----
  # 0.20 betekent: > 0.20 * distance => switch, anders revert :contentReference[oaicite:1]{index=1}
  workspace_swipe_distance = 250
  workspace_swipe_cancel_ratio = 0.20

  # Snelle swipes forceren sneller (lager = sneller forcen) :contentReference[oaicite:2]{index=2}
  workspace_swipe_min_speed_to_force = 10

  # Wel “nieuwe workspace” maken op de rand :contentReference[oaicite:3]{index=3}
  workspace_swipe_create_new = true

  # Voorkom “scheef swipe = richting flip” :contentReference[oaicite:4]{index=4}
  workspace_swipe_direction_lock = true
  workspace_swipe_direction_lock_threshold = 5

  # Als links/rechts omgekeerd voelt, uncomment deze:
  # workspace_swipe_invert = false

  # 3-finger: scrolling layout navigatie
  gesture = 3, left,  dispatcher, layoutmsg, focus r
  gesture = 3, right, dispatcher, layoutmsg, focus l
}

# Scrolling-aware window move
bind = SUPER ALT, left,  movewindow, l
bind = SUPER ALT, right, movewindow, r

# Reorder inside a stack / column
bind = SUPER ALT, up,    swapwindow, u
bind = SUPER ALT, down,  swapwindow, d

# Pull current window back into its own column
bind = SUPER ALT, P,     layoutmsg, promote

# Resize active window with Ctrl + Super + Arrow keys
binde = CTRL SUPER, left,  resizeactive, -10 0
binde = CTRL SUPER, right, resizeactive,  10 0
binde = CTRL SUPER, up,    resizeactive,  0 -10
binde = CTRL SUPER, down,  resizeactive,  0 10
# Bit faster
binde = CTRL SHIFT SUPER, left,  resizeactive, -30 0
binde = CTRL SHIFT SUPER, right, resizeactive,  30 0
binde = CTRL SHIFT SUPER, up,    resizeactive,  0 -30
binde = CTRL SHIFT SUPER, down,  resizeactive,  0 30

# Dwindle — core settings
dwindle {
    # default = false | values = true/false | Houd splitrichting vast; voorkomt dat side/top dynamisch flipt
    preserve_split = true

    # default = false | values = true/false | Slimmere split op basis van cursorpositie; zet ook preserve_split aan
    smart_split = false

    # default = 0 | values = 0/1/2 | 0 = volgt muis, 1 = nieuw venster links/boven, 2 = nieuw venster rechts/onder
    force_split = 2

    # default = true | values = true/false | Resize-richting volgt dichtstbijzijnde hoek i.p.v. alleen tile-positie
    smart_resizing = true

    # default = 1.0 | range = 0.0+ (float) | Helpt op brede schermen; hoger = sneller side-by-side blijven splitten
    split_width_multiplier = 1.5

    # default = 1.0 | range = 0.0 - 1.0 | Schaal van vensters op special workspace
    special_scale_factor = 0.95

    # ---------- Optional later tweaks ----------

    # default = false | values = true/false | Pseudotile: tiled venster behoudt z'n floating size
    # pseudotile = false

    # default = false | values = true/false | Houd preselect-richting vast tot jij die wijzigt of uitzet
    # permanent_direction_override = false

    # default = true | values = true/false | Gebruik actieve window voor nieuwe splits i.p.v. muispositie
    # use_active_for_splits = true

    # default = 1.0 | range = 0.1 - 1.9 | 1.0 = nette 50/50 split bij nieuw venster
    # default_split_ratio = 1.0

    # default = 0 | values = 0/1 | 0 = splitratio naar top/left window, 1 = splitratio naar huidige window
    # split_bias = 0

    # default = false | values = true/false | bindm movewindow dropt preciezer op basis van muispositie
    # precise_mouse_move = false
}

# Scrolling — core settings
scrolling {
    # default = 0.5 | range = 0.1 - 1.0 | Standaard kolombreedte; hoger = bredere, rustigere columns
    column_width = 0.65

    # default = 1 | values = 0/1 | 0 = center focused column, 1 = fit focused column in beeld
    focus_fit_method = 0

    # default = true | values = true/false | Layout volgt focus automatisch zodat focused window in beeld komt
    follow_focus = true

    # default = 0.4 | range = 0.0 - 1.0 | Minimale zichtbaarheid vóór follow_focus ingrijpt
    follow_min_visible = 0.55

    # default = 0.333, 0.5, 0.667, 1.0 | values = comma-separated floats | Presets voor layoutmsg colresize +conf/-conf
    explicit_column_widths = 0.58, 0.66, 0.75, 0.85, 1.00

    # default = right | values = left/right/down/up | Richting waarin nieuwe windows verschijnen en layout scrolt
    direction = right

    # ---------- Optional later tweaks ----------

    # default = true | values = true/false | Fullscreen beperkt tot één kolom i.p.v. hele scrolling layout
    # fullscreen_on_one_column = true

    # default = true | values = true/false | layoutmsg focus l/r wrapt aan begin/einde
    # wrap_focus = false
    # Commented ivm kapot in 0.54.3

    # default = true | values = true/false | layoutmsg swapcol l/r wrapt aan begin/einde
    # wrap_swapcol = false
    # Commented ivm kapot in 0.54.3
}

animations {
    enabled = true

    # Smooth premium, tuned for 60/66Hz
    bezier = premium,    0.20, 0.95, 0.30, 1.00
    bezier = smoothOut,  0.25, 1.00, 0.35, 1.00
    bezier = softBounce, 0.20, 0.90, 0.25, 1.02

    # Windows
    animation = windows,         1, 5, softBounce, popin 94%
    animation = windowsIn,       1, 5, softBounce, popin 94%
    animation = windowsOut,      1, 4, smoothOut,  popin 96%
    animation = windowsMove,     1, 4, premium

    # Fade
    animation = fade,            1, 4, smoothOut
    animation = fadeIn,          1, 4, smoothOut
    animation = fadeOut,         1, 3, smoothOut
    animation = fadeSwitch,      1, 3, smoothOut
    animation = fadeShadow,      1, 3, smoothOut
    animation = fadeDim,         1, 4, smoothOut

    # Layers
    animation = layers,          1, 4, smoothOut
    animation = layersIn,        1, 4, smoothOut, fade
    animation = layersOut,       1, 3, smoothOut, fade

    # Borders
    animation = border,          1, 5, premium
    animation = borderangle,     1, 6, premium

    # Workspaces
    animation = workspaces,      1, 5, premium, slidefade 12%
    animation = workspacesIn,    1, 5, premium, slidefade 12%
    animation = workspacesOut,   1, 4, premium, slidefade 12%

    # Special workspace
    animation = specialWorkspace,    1, 5, premium, slidefade 14%
    animation = specialWorkspaceIn,  1, 5, premium, slidefade 14%
    animation = specialWorkspaceOut, 1, 4, premium, slidefade 14%
}

general {
    gaps_in = 3
    gaps_out = 6
    border_size = 1

    layout = scrolling
}

decoration {
    rounding = 8
    rounding_power = 4

    active_opacity = 0.975
    inactive_opacity = 0.925
    fullscreen_opacity = 1.00

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000028)
        color_inactive = rgba(00000018)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.01
        contrast = 0.95
        brightness = 0.95
        popups = true
        popups_ignorealpha = 0.2
    }
}

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar
layerrule = blur_popups on, match:namespace waybar

layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.2, match:namespace notifications

# Media overwrite
# remove Omarchy defaults
unbind = , XF86AudioRaiseVolume
unbind = , XF86AudioLowerVolume
unbind = ALT, XF86AudioRaiseVolume
unbind = ALT, XF86AudioLowerVolume

bindeld = , XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume +1
bindeld = , XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume -1
#bindeld = SHIFT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +5
#bindeld = SHIFT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -5

# brightness normal keys -> precise 1%
#unbind = ,XF86MonBrightnessUp
#unbind = ,XF86MonBrightnessDown
unbind = ALT, XF86MonBrightnessUp
unbind = ALT, XF86MonBrightnessDown

#bindeld = ,XF86MonBrightnessUp, Brightness up, exec, omarchy-brightness-display +5%
#bindeld = ,XF86MonBrightnessDown, Brightness down, exec, omarchy-brightness-display 5%-
bindeld = CONTROL , XF86MonBrightnessUp, Brightness up, exec, omarchy-brightness-display +1%
bindeld = CONTROL , XF86MonBrightnessDown, Brightness down, exec, omarchy-brightness-display 1%-
bindeld = SHIFT , XF86MonBrightnessUp, Brightness up, exec, omarchy-brightness-display +10%
bindeld = SHIFT , XF86MonBrightnessDown, Brightness down, exec, omarchy-brightness-display 10%-

bind = CTRL SUPER, 1, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 1
bind = CTRL SUPER, 2, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 2
bind = CTRL SUPER, 3, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 3
bind = CTRL SUPER, 4, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 4
bind = CTRL SUPER, 5, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 5
bind = CTRL SUPER, 6, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 6
bind = CTRL SUPER, 7, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 7
bind = CTRL SUPER, 8, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 8
bind = CTRL SUPER, 9, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 9
bind = CTRL SUPER, 0, exec, ~/.config/hypr/scripts/focus-scroller-index.sh 0
